# ============================================================
# Copia questo file in application.properties e compila i valori
# NON committare mai application.properties su git
# ============================================================

# Server
server.port=8080

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/auth2fa_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
# Genera con: openssl rand -base64 64
jwt.secret=YOUR_JWT_SECRET_MIN_64_CHARS
jwt.expiration-ms=900000
jwt.refresh-expiration-ms=604800000

# Temporary token (after step 1 login, before TOTP)
jwt.temp-expiration-ms=300000

# AES encryption for TOTP secret
# Genera con: openssl rand -base64 32  (deve essere esattamente 32 byte per AES-256)
encryption.key=YOUR_AES_256_KEY_32_BYTES

# CORS
cors.allowed-origins=http://localhost:4200

# Rate limiting (tentativi per minuto per IP)
rate-limit.login.capacity=5
rate-limit.login.refill-minutes=1

# Logging
logging.level.com.giuliotaddei=INFO
logging.level.org.springframework.security=WARN